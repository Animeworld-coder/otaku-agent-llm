<style>
    body { font-family: sans-serif; background: #0a0a0a; color: white; text-align: center; padding: 50px; }
    .login-box { background: #161616; padding: 30px; border-radius: 15px; display: inline-block; border: 1px solid #333; }
    input { padding: 10px; margin: 10px 0; width: 100%; border-radius: 5px; border: 1px solid #444; background: #111; color: white; }
    button { background: #e50914; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; width: 100%; }
</style>

<div class="login-box">
    <h2>Login to Anime DB</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
</div>
